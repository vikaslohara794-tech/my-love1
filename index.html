<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vikas ❤️ Chandani</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff4d6d,#ff99ac,#ffd6e0);
}

.card{
background:rgba(255,255,255,.15);
backdrop-filter:blur(10px);
padding:35px;
border-radius:25px;
text-align:center;
color:#fff;
box-shadow:0 0 25px rgba(0,0,0,.3);
max-width:350px;
position:relative;
z-index:10;
}

h1{
font-size:34px;
margin-bottom:15px;
}

p{
font-size:18px;
margin-bottom:20px;
}

button{
padding:12px 28px;
border:none;
border-radius:30px;
font-size:18px;
cursor:pointer;
margin:10px;
transition:.3s;
}

#yes{
background:#ff1744;
color:#fff;
}

#yes:hover{
transform:scale(1.1);
}

#no{
background:#fff;
color:#ff1744;
position:relative;
}

#message{
display:none;
margin-top:20px;
font-size:22px;
font-weight:bold;
animation:pop .8s infinite alternate;
}

@keyframes pop{
from{transform:scale(1);}
to{transform:scale(1.1);}
}

.heart{
position:absolute;
font-size:22px;
animation:fall linear infinite;
color:red;
}

@keyframes fall{
0%{
transform:translateY(-100px);
opacity:1;
}
100%{
transform:translateY(110vh);
opacity:0;
}
}
</style>
</head>

<body>

<div class="card">

<h1>❤️ Vikas ❤️ Chandani ❤️</h1>

<p>
From the day I met you,<br>
my life became more beautiful. 💖
</p>

<h2>Will You Be Mine Forever? 💍</h2>

<button id="yes">Yes ❤️</button>

<button id="no">No 😅</button>

<div id="message">
I Love You Chandani ❤️🥹
</div>

</div>
<script>
const yes=document.getElementById("yes");
const no=document.getElementById("no");
const message=document.getElementById("message");

yes.onclick=function(){
message.style.display="block";
document.body.style.background="linear-gradient(135deg,#ff1744,#ff80ab,#ffd1dc)";
}

no.addEventListener("touchstart",moveButton);
no.addEventListener("mouseover",moveButton);

function moveButton(){
const x=Math.random()*(window.innerWidth-120);
const y=Math.random()*(window.innerHeight-70);
no.style.position="fixed";
no.style.left=x+"px";
no.style.top=y+"px";
}

function createHeart(){
const heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(Math.random()*3+2)+"s";
heart.style.fontSize=(Math.random()*25+20)+"px";
document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},5000);
}

setInterval(createHeart,250);
</script>

</body>
</html>
