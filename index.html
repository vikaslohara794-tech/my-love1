<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vikas ❤️ Chandani</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff4d6d,#ff99ac,#ffd6e0);
position:relative;
}

.card{
background:rgba(255,255,255,.15);
backdrop-filter:blur(10px);
padding:30px;
border-radius:25px;
text-align:center;
color:white;
box-shadow:0 0 25px rgba(0,0,0,.25);
max-width:380px;
width:90%;
z-index:10;
}

h1{
font-size:30px;
margin-bottom:10px;
}

.subtitle{
font-size:17px;
margin-bottom:15px;
}

.counter{
margin:15px 0;
font-size:18px;
font-weight:bold;
color:#fff;
}

.ring{
font-size:50px;
animation:ring 2s infinite;
margin:10px 0;
}

@keyframes ring{
0%{transform:rotate(0deg);}
25%{transform:rotate(15deg);}
50%{transform:rotate(-15deg);}
75%{transform:rotate(15deg);}
100%{transform:rotate(0deg);}
}

button{
padding:12px 25px;
border:none;
border-radius:30px;
font-size:18px;
cursor:pointer;
margin:8px;
transition:.3s;
}

#yes{
background:#ff1744;
color:white;
}

#yes:hover{
transform:scale(1.1);
}

#no{
background:white;
color:#ff1744;
position:relative;
}

#message{
display:none;
font-size:24px;
font-weight:bold;
margin-top:20px;
animation:pop 1s infinite alternate;
}

@keyframes pop{
from{transform:scale(1);}
to{transform:scale(1.1);}
}

.heart{
position:absolute;
font-size:25px;
color:red;
animation:fall linear infinite;
}

@keyframes fall{
0%{
transform:translateY(-100px);
opacity:1;
}
100%{
transform:translateY(120vh);
opacity:0;
}
}

#letter{
margin-top:20px;
font-size:16px;
line-height:28px;
min-height:100px;
}

</style>
</head>

<body>

<div class="card">

<h1>❤️ Vikas ❤️ Chandani ❤️</h1>

<div class="ring">💍</div>

<p class="subtitle">
We Met On 27 July 2024 ☺️
</p>

<div class="counter" id="counter">
Loading Love Counter...
</div>

<h2>Will You Be Mine Forever? 💖</h2>

<button id="yes">Yes ❤️</button>
<button id="no">No 😅</button>

<div id="message">
I Love You Chandani ❤️🥹
</div>

<div id="letter"></div>

</div>
<script>

// =========================
// LOVE COUNTER
// =========================

const meetDate = new Date("July 27, 2024 00:00:00");

function updateCounter(){

const now = new Date();

const diff = now - meetDate;

const days = Math.floor(diff/(1000*60*60*24));

const hours = Math.floor((diff/(1000*60*60))%24);

const mins = Math.floor((diff/(1000*60))%60);

const secs = Math.floor((diff/1000)%60);

document.getElementById("counter").innerHTML =
"💕 Together Since ❤️<br><br>" +
days + " Days " +
hours + " Hours " +
mins + " Minutes " +
secs + " Seconds";

}

setInterval(updateCounter,1000);

updateCounter();


// =========================
// TYPING LOVE LETTER
// =========================

const text = `Dear Chandani ❤️

From the day I met you on 27 July 2024...

Everything became more beautiful.

Your smile,
Your voice,
Your care...

means everything to me.

I just want one answer...

Will You Stay With Me Forever? 💍❤️`;

let i=0;

function typing(){

if(i<text.length){

document.getElementById("letter").innerHTML += text.charAt(i);

i++;

setTimeout(typing,45);

}

}

typing();


// =========================
// ROSES
// =========================

function rose(){

let r=document.createElement("div");

r.className="heart";

r.innerHTML="🌹";

r.style.left=Math.random()*100+"vw";

r.style.animationDuration=(3+Math.random()*5)+"s";

r.style.fontSize=(20+Math.random()*20)+"px";

document.body.appendChild(r);

setTimeout(()=>{

r.remove();

},8000);

}

setInterval(rose,250);


// =========================
// NO BUTTON RUN
// =========================

const no=document.getElementById("no");

no.addEventListener("mouseover",()=>{

no.style.position="absolute";

no.style.left=Math.random()*80+"vw";

no.style.top=Math.random()*80+"vh";

});


// =========================
// YES BUTTON
// =========================

document.getElementById("yes").onclick=function(){

document.getElementById("message").style.display="block";

alert("❤️ Yay!! I Love You Chandani ❤️");
  <!-- Romantic Music -->
<audio id="bgMusic" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<canvas id="confetti"></canvas>

<style>
#confetti{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:999;
}
</style>

<script>

// Music Start
const music=document.getElementById("bgMusic");

document.body.addEventListener("click",function(){
music.play().catch(()=>{});
},{once:true});

// Confetti
const canvas=document.getElementById("confetti");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

function confetti(){

for(let i=0;i<200;i++){

ctx.fillStyle=`hsl(${Math.random()*360},100%,50%)`;

ctx.beginPath();

ctx.arc(
Math.random()*canvas.width,
Math.random()*canvas.height,
Math.random()*6+2,
0,
Math.PI*2);

ctx.fill();

}

setTimeout(()=>{
ctx.clearRect(0,0,canvas.width,canvas.height);
},3000);

}

// Replace old YES button function

document.getElementById("yes").onclick=function(){

document.getElementById("message").style.display="block";

music.play();

confetti();

alert("❤️ Thank You Chandani ❤️");

};

</script>


};

</script>

</body>
</html>
